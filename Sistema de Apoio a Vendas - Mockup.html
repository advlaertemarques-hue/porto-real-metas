<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porto Real · Apoio à Venda (Mockup)</title>
<style>
  :root{
    --azul:#1F4E79; --azul2:#2E6CA8; --azul-claro:#D6E4F0; --azul-bg:#EEF4FA;
    --cinza:#F5F7FA; --linha:#E2E8F0; --texto:#1f2933; --muted:#6b7280;
    --verde:#1f9d6b; --verde-bg:#e6f5ee; --amarelo:#d99a00; --amarelo-bg:#fbf3df;
    --vermelho:#d6453d; --vermelho-bg:#fdeceb;
    --quente:#d6453d; --morno:#d99a00; --frio:#4b7bbd;
    --radius:12px; --sombra:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--texto);background:var(--cinza);height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .topbar{background:var(--azul);color:#fff;padding:0 22px;display:flex;align-items:center;gap:20px;flex-shrink:0;height:58px}
  .topbar .logo{font-weight:800;font-size:17px;letter-spacing:.3px}
  .nav{display:flex;gap:4px;margin-left:8px}
  .nav button{background:transparent;border:none;color:rgba(255,255,255,.78);font-family:inherit;font-size:14px;
    font-weight:600;padding:8px 15px;border-radius:8px;cursor:pointer;transition:.15s}
  .nav button:hover{background:rgba(255,255,255,.12);color:#fff}
  .nav button.on{background:#fff;color:var(--azul);font-weight:700}
  .badge-mock{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
    padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
  #app{flex:1;display:flex;min-height:0}
  /* ===== FUNIL ===== */
  .sidebar{width:300px;background:#fff;border-right:1px solid var(--linha);display:flex;flex-direction:column;flex-shrink:0}
  .sidebar h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:16px 18px 8px}
  .btn-novo{margin:0 18px 10px;padding:9px;border:1px dashed var(--azul2);color:var(--azul);background:var(--azul-bg);
    border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
  .btn-novo:hover{background:var(--azul-claro)}
  .lista{overflow-y:auto;flex:1;padding:0 12px 16px}
  .card-cli{padding:12px 13px;border:1px solid var(--linha);border-radius:11px;margin-bottom:9px;cursor:pointer;background:#fff;transition:.15s}
  .card-cli:hover{border-color:var(--azul2);box-shadow:var(--sombra)}
  .card-cli.ativo{border-color:var(--azul);background:var(--azul-bg);box-shadow:var(--sombra)}
  .card-cli .nome{font-weight:700;font-size:14.5px;margin-bottom:3px}
  .card-cli .meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .pill-mini{font-size:10.5px;padding:1px 7px;border-radius:10px;font-weight:700}
  .card-cli .etapa{margin-top:7px;font-size:11.5px;color:var(--azul);font-weight:600}
  .prog-mini{height:4px;background:var(--linha);border-radius:4px;margin-top:6px;overflow:hidden}
  .prog-mini > div{height:100%;background:var(--azul2)}
  .main{flex:1;overflow-y:auto;padding:22px 26px 60px}
  .cli-head{background:#fff;border:1px solid var(--linha);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--sombra)}
  .cli-head .top{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .cli-head .nome{font-size:22px;font-weight:800}
  .cli-head .contato{font-size:13px;color:var(--muted);margin-top:3px}
  .head-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{font-size:12px;padding:5px 12px;border-radius:20px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
  .pill-perfil{background:var(--azul-claro);color:var(--azul)}
  .pill-perfil.vazio{background:var(--vermelho-bg);color:var(--vermelho)}
  select.temp{font-family:inherit;font-weight:700;font-size:12px;border:1px solid var(--linha);border-radius:20px;padding:5px 10px;cursor:pointer;color:var(--texto);background:#fff}
  .sec{margin-top:22px}
  .sec-titulo{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--azul);font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:9px}
  .sec-titulo .num{background:var(--azul);color:#fff;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:12px}
  .stepper{background:#fff;border:1px solid var(--linha);border-radius:var(--radius);padding:16px;box-shadow:var(--sombra);display:flex;flex-wrap:wrap;gap:8px}
  .step{display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:9px;border:1px solid var(--linha);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted);background:#fff;transition:.15s}
  .step:hover{border-color:var(--azul2)}
  .step .n{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;background:var(--linha);color:var(--muted);flex-shrink:0}
  .step.done{color:var(--verde);border-color:var(--verde-bg);background:var(--verde-bg)}
  .step.done .n{background:var(--verde);color:#fff}
  .step.atual{color:#fff;background:var(--azul);border-color:var(--azul);box-shadow:0 2px 6px rgba(31,78,121,.3)}
  .step.atual .n{background:#fff;color:var(--azul)}
  .grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-top:22px}
  @media(max-width:1050px){.grid2{grid-template-columns:1fr}}
  .panel{background:#fff;border:1px solid var(--linha);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--sombra)}
  .perfis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .perfil{border:1.5px solid var(--linha);border-radius:11px;padding:11px 12px;cursor:pointer;transition:.15s;background:#fff}
  .perfil:hover{border-color:var(--azul2);background:var(--azul-bg)}
  .perfil.sel{border-color:var(--azul);background:var(--azul-bg);box-shadow:0 0 0 3px rgba(31,78,121,.12)}
  .perfil .ph{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px}
  .perfil .ph .emo{font-size:17px}
  .perfil .busca{font-size:11px;color:var(--muted);font-weight:600;margin:2px 0 7px;text-transform:uppercase;letter-spacing:.4px}
  .perfil ul{list-style:none;font-size:11.8px;color:#374151;line-height:1.5}
  .perfil li{padding-left:13px;position:relative}
  .perfil li:before{content:"\203A";position:absolute;left:2px;color:var(--azul2);font-weight:800}
  .playbook{margin-top:13px;border:1px solid var(--azul-claro);background:var(--azul-bg);border-radius:11px;padding:13px 15px}
  .playbook h4{color:var(--azul);font-size:13px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .playbook ul{list-style:none;font-size:13px;line-height:1.65}
  .playbook li{padding-left:16px;position:relative}
  .playbook li:before{content:"\2713";position:absolute;left:0;color:var(--verde);font-weight:800}
  .playbook .frase{margin-top:9px;font-style:italic;font-size:12.5px;color:#3a4a5a;border-left:3px solid var(--azul2);padding-left:10px}
  .hint{font-size:12px;color:var(--muted);background:var(--cinza);border-radius:8px;padding:9px 11px;margin-bottom:11px;line-height:1.45}
  .chk-prog{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .chk-bar{flex:1;height:8px;background:var(--linha);border-radius:6px;overflow:hidden}
  .chk-bar > div{height:100%;background:var(--verde);transition:.25s;width:0}
  .chk-pct{font-size:12px;font-weight:800;color:var(--verde);min-width:38px;text-align:right}
  .chk-item{display:flex;align-items:flex-start;gap:10px;padding:9px 4px;border-bottom:1px solid var(--cinza);cursor:pointer}
  .chk-item:last-child{border-bottom:none}
  .chk-box{width:20px;height:20px;border:2px solid var(--linha);border-radius:6px;flex-shrink:0;display:grid;place-items:center;transition:.15s;margin-top:1px;font-size:13px;color:#fff}
  .chk-item.on .chk-box{background:var(--verde);border-color:var(--verde)}
  .chk-item .txt{font-size:13.5px;line-height:1.4}
  .chk-item.on .txt{color:var(--muted);text-decoration:line-through}
  .nota-form{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .nota-form textarea{font-family:inherit;font-size:13.5px;border:1px solid var(--linha);border-radius:10px;padding:10px 12px;resize:vertical;min-height:62px}
  .nota-form textarea:focus{outline:none;border-color:var(--azul2)}
  .nota-form .row{display:flex;gap:8px;align-items:center}
  .btn{background:var(--azul);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{background:var(--azul2)}
  .timeline{display:flex;flex-direction:column;gap:0}
  .nota{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--cinza)}
  .nota:last-child{border-bottom:none}
  .nota .linha-tempo{display:flex;flex-direction:column;align-items:center}
  .nota .bolha{width:10px;height:10px;border-radius:50%;background:var(--azul2);margin-top:5px}
  .nota .fio{flex:1;width:2px;background:var(--linha);margin-top:3px}
  .nota .corpo{flex:1;padding-bottom:2px}
  .nota .cab{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
  .nota .data{font-size:11.5px;color:var(--muted);font-weight:600}
  .nota .tag{font-size:10.5px;background:var(--azul-claro);color:var(--azul);padding:1px 8px;border-radius:10px;font-weight:700}
  .nota .texto{font-size:13.5px;line-height:1.5;white-space:pre-wrap}
  .vazio-msg{color:var(--muted);font-size:13px;font-style:italic;padding:8px 0}
  /* ===== VIEWS GENÉRICAS ===== */
  .view{flex:1;overflow-y:auto;padding:24px 30px 60px}
  .view-head{margin-bottom:18px}
  .view-head h1{font-size:24px;color:var(--azul);font-weight:800}
  .view-head p{font-size:13.5px;color:var(--muted);margin-top:3px}
  .seg{display:inline-flex;background:#fff;border:1px solid var(--linha);border-radius:10px;padding:3px;gap:2px;margin-left:auto}
  .seg button{border:none;background:transparent;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--muted);padding:6px 13px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--azul);color:#fff}
  /* ===== METAS ===== */
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
  .kpi{background:#fff;border:1px solid var(--linha);border-radius:var(--radius);padding:16px 17px;box-shadow:var(--sombra)}
  .kpi .lab{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:7px}
  .kpi .auto{font-size:9.5px;background:var(--verde-bg);color:var(--verde);padding:1px 6px;border-radius:8px;font-weight:800;letter-spacing:0}
  .kpi .val{font-size:27px;font-weight:800;margin:9px 0 2px}
  .kpi .alvo{font-size:12px;color:var(--muted)}
  .kpi .barra{height:8px;background:var(--linha);border-radius:6px;overflow:hidden;margin-top:11px}
  .kpi .barra > div{height:100%;border-radius:6px;transition:.3s}
  .kpi .pctlab{font-size:11.5px;font-weight:800;margin-top:6px;text-align:right}
  .funil-box{margin-top:18px}
  .fstage{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .fstage .fn{font-size:13px;font-weight:700;width:130px;flex-shrink:0}
  .fstage .fbar{flex:1;height:30px;background:var(--cinza);border-radius:7px;overflow:hidden;position:relative}
  .fstage .fbar > div{height:100%;background:linear-gradient(90deg,var(--azul),var(--azul2));display:flex;align-items:center;padding:0 10px;color:#fff;font-weight:700;font-size:12.5px;border-radius:7px}
  .fstage .fconv{font-size:12px;color:var(--muted);width:74px;text-align:right;flex-shrink:0}
  .mini{display:flex;gap:8px;align-items:center;margin-top:10px}
  .mini button{border:1px solid var(--linha);background:#fff;border-radius:8px;width:30px;height:30px;font-size:16px;font-weight:800;cursor:pointer;color:var(--azul)}
  .mini button:hover{background:var(--azul-bg)}
  /* ===== PESQUISAS ===== */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:1000px){.cols{grid-template-columns:1fr}}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:#374151;margin-bottom:5px}
  .field select,.field input{width:100%;font-family:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--linha);border-radius:9px;background:#fff}
  .qlist{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .qopt{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--linha);border-radius:9px;font-size:13px;cursor:pointer}
  .qopt.on{border-color:var(--azul);background:var(--azul-bg)}
  .qopt .cb{width:18px;height:18px;border:2px solid var(--linha);border-radius:5px;display:grid;place-items:center;color:#fff;font-size:12px}
  .qopt.on .cb{background:var(--azul);border-color:var(--azul)}
  .linkbox{margin-top:14px;background:var(--azul-bg);border:1px dashed var(--azul2);border-radius:10px;padding:13px;font-size:12.5px;color:var(--azul);word-break:break-all;display:none}
  .linkbox.show{display:block}
  /* phone */
  .phone{max-width:360px;margin:0 auto;border:9px solid #1c2530;border-radius:32px;background:#fff;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.22)}
  .phone-top{background:var(--azul);color:#fff;padding:16px 18px}
  .phone-top h3{font-size:16px}
  .phone-top p{font-size:11.5px;opacity:.85;margin-top:2px}
  .phone-body{padding:16px 16px 20px;max-height:62vh;overflow-y:auto}
  .ffield{margin-bottom:14px}
  .ffield .fl{font-size:13px;font-weight:700;margin-bottom:7px;display:block}
  .opts{display:flex;flex-wrap:wrap;gap:7px}
  .opt{border:1.5px solid var(--linha);border-radius:9px;padding:8px 12px;font-size:12.5px;cursor:pointer;background:#fff;flex:1;text-align:center;min-width:60px}
  .opt.on{border-color:var(--azul);background:var(--azul-bg);color:var(--azul);font-weight:700}
  .opt-col{display:flex;flex-direction:column;gap:7px}
  .opt-col .opt{flex:none;text-align:left}
  .lgpd{font-size:10.5px;color:var(--muted);background:var(--cinza);border-radius:8px;padding:9px 10px;line-height:1.45;margin-top:6px}
  .devnote{margin-top:13px;border:1px dashed var(--amarelo);background:var(--amarelo-bg);border-radius:10px;padding:12px 13px;font-size:12.5px;color:#7a5b00;display:none}
  .devnote.show{display:block}
  .devnote b{color:var(--azul)}
  /* banco */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:18px}
  .stat{background:#fff;border:1px solid var(--linha);border-radius:11px;padding:14px 15px;box-shadow:var(--sombra)}
  .stat .l{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase}
  .stat .v{font-size:23px;font-weight:800;margin-top:4px}
  .lead-card{background:#fff;border:1px solid var(--linha);border-radius:11px;padding:13px 15px;margin-bottom:10px;box-shadow:var(--sombra)}
  .lead-card .lc-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:7px}
  .lead-card .lc-nome{font-weight:700;font-size:14.5px}
  .tipo-tag{font-size:10.5px;padding:2px 9px;border-radius:10px;font-weight:700}
  .lc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px 14px;font-size:12.5px}
  .lc-grid b{color:var(--muted);font-weight:700;font-size:11px;display:block;text-transform:uppercase;letter-spacing:.3px}
  .temas{display:flex;flex-direction:column;gap:8px}
  .tema{display:flex;align-items:center;gap:10px}
  .tema .tn{font-size:13px;width:170px;flex-shrink:0}
  .tema .tb{flex:1;height:20px;background:var(--cinza);border-radius:6px;overflow:hidden}
  .tema .tb > div{height:100%;background:var(--vermelho);opacity:.8;border-radius:6px}
  .tema .tv{font-size:12px;color:var(--muted);width:34px;text-align:right}
  .filtros{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
  .filtros button{border:1px solid var(--linha);background:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer}
  .filtros button.on{background:var(--azul);color:#fff;border-color:var(--azul)}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:center;justify-content:center;z-index:50}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:22px 24px;width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .modal h3{font-size:17px;margin-bottom:14px;color:var(--azul)}
  .modal label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 4px}
  .modal input,.modal select{width:100%;font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--linha);border-radius:9px}
  .modal .acoes{display:flex;gap:9px;margin-top:18px}
  .btn-sec{background:#fff;color:var(--muted);border:1px solid var(--linha)}
  .btn-sec:hover{background:var(--cinza)}
  .owdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:1px}
  .legend-resp{display:flex;flex-wrap:wrap;gap:13px;margin-top:11px;font-size:11.5px;font-weight:600;color:#374151}
  .legend-resp span{display:inline-flex;align-items:center;gap:5px}
  .legend-resp i{width:9px;height:9px;border-radius:50%;display:inline-block}
  .pill-resp{background:#eef4fa;color:#1F4E79;font-size:12px;padding:5px 12px;border-radius:20px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
  .exp-badge{background:#fbf1e3;color:#c77d2e;font-size:10px;font-weight:800;padding:3px 8px;border-radius:9px;letter-spacing:.3px;vertical-align:middle}
  .exp-mini{font-size:10px;font-weight:800;color:#c77d2e;background:#fbf1e3;padding:1px 6px;border-radius:8px}
  .exp-banner{background:#fbf1e3;border:1px solid #ecd3ad;border-left:4px solid #c77d2e;border-radius:10px;padding:11px 14px;margin-top:14px;font-size:13px;color:#7a5b00;line-height:1.5}
  .exp-banner b{color:#c77d2e}
  .quiz-result{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:13px;background:var(--azul-bg);border:1px solid var(--azul-claro);border-radius:11px;padding:11px 14px}
  .quiz-result .qr-lab{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
  .quiz-result .qr-perfil{font-size:16px;font-weight:800;color:var(--azul)}
  .quiz-result .qr-meta{font-size:11.5px;color:var(--muted)}
  .quiz-result .qr-refazer{margin-left:auto;background:#fff;border:1px solid var(--linha);border-radius:8px;padding:5px 11px;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--azul2);cursor:pointer}
  .resumo p{font-size:13.5px;line-height:1.55;margin-bottom:7px}
  .resumo p:last-child{margin-bottom:0}
  .resumo .rz-next{color:var(--azul);font-weight:600}
  .resumo .rz-exp{color:#7a5b00;background:#fbf1e3;border-radius:7px;padding:6px 10px;font-weight:600}
  .crm-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:760px){.crm-grid{grid-template-columns:1fr 1fr}}
  .crm-grid .field{margin-bottom:0}
  .field textarea{width:100%;font-family:inherit;font-size:13.5px;border:1px solid var(--linha);border-radius:9px;padding:9px 11px;resize:vertical;min-height:52px}
  .field textarea:focus,.field input:focus,.field select:focus{outline:none;border-color:var(--azul2)}
  .btn-ficha{background:#fff;border:1px solid var(--azul2);color:var(--azul);border-radius:20px;padding:5px 13px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .btn-ficha:hover{background:var(--azul-bg)}

/* ================= METAS ================= */
function calcMetas(){
  const fechados=clientes.filter(c=>c.etapa>=I_FECHAMENTO);
  const vgvFunil=fechados.reduce((s,c)=>s+(c.valor||0),0);
  const visitasFunil=clientes.filter(c=>c.etapa>=I_VISITA).length;
  let somaPct=0;
  clientes.forEach(c=>{ somaPct += (c.feitos[1]||[]).length/ETAPAS[1].chk.length; });
  const cadastroPct=Math.round(somaPct/clientes.length*100);
  const nVis=clientes.filter(c=>c.etapa>=I_VISITA).length;
  const nProp=clientes.filter(c=>c.etapa>=I_PROPOSTA).length;
  const nFech=fechados.length;
  const conv=nVis?Math.round(nFech/nVis*100):0;
  const nt=respostas.filter(r=>r.notaAtend!=null);
  const satisf=nt.length?(nt.reduce((s,r)=>s+r.notaAtend,0)/nt.length):0;
  return {vgvFunil, visitasFunil, cadastroPct, nVis, nProp, nFech, conv, satisf};
}
function kpiCard(lab, auto, val, alvo, pct, cor){
  const c = pct>=100?'var(--verde)':(pct>=60?'var(--azul2)':'var(--amarelo)');
  return '<div class="kpi"><div class="lab">'+lab+(auto?' <span class="auto">AUTO</span>':'')+'</div>'
    +'<div class="val">'+val+'</div><div class="alvo">'+alvo+'</div>'
    +'<div class="barra"><div style="width:'+Math.min(pct,100)+'%;background:'+(cor||c)+'"></div></div>'
    +'<div class="pctlab" style="color:'+(cor||c)+'">'+pct+'% da meta</div></div>';
}
function renderMetas(){
  const m=calcMetas();
  const per=metaPeriodo;
  const vgvMeta=metas.vgvMeta[per];
  const vgvReal=metas.vgvRealExtra[per]+m.vgvFunil;
  const vgvPct=Math.round(vgvReal/vgvMeta*100);
  const capPct=Math.round(metas.captadoReal/metas.captadoMeta*100);
  const visReal=metas.visitaBase+m.visitasFunil;
  const visPct=Math.round(visReal/metas.visitaMeta*100);
  const cadPct=Math.round(m.cadastroPct/metas.cadastroMeta*100);
  const convPct=Math.round(m.conv/metas.convMeta*100);
  const tempPct=Math.round(metas.tempoMeta/metas.tempoReal*100);
  const satPct=Math.round(m.satisf/metas.satisfMeta*100);
  const perLabel={mes:"no mês",tri:"no trimestre",sem:"no semestre",ano:"no ano"}[per];

  const REG={
    captados:{lab:"Imóveis captados", auto:false, val:metas.captadoReal, alvo:"Meta: "+metas.captadoMeta+" no mês", pct:capPct},
    vgv:{lab:"VGV de venda", auto:true, val:fmtBRL(vgvReal), alvo:"Meta: "+fmtBRL(vgvMeta)+" "+perLabel, pct:vgvPct},
    conversao:{lab:"Conversão visita→venda", auto:true, val:m.conv+"%", alvo:"Meta: "+metas.convMeta+"%", pct:convPct},
    satisfacao:{lab:"Satisfação do cliente", auto:true, val:m.satisf.toFixed(1)+"/10", alvo:"Meta: "+metas.satisfMeta+"/10", pct:satPct},
    visitas:{lab:"Visitas realizadas", auto:true, val:visReal, alvo:"Meta: "+metas.visitaMeta+" no mês", pct:visPct},
    cadastro:{lab:"% cadastro completo", auto:true, val:m.cadastroPct+"%", alvo:"Meta: "+metas.cadastroMeta+"%", pct:cadPct},
  };
  let kpis='';
  metasAtivas.forEach(k=>{ const r=REG[k]; if(r) kpis+=kpiCard(r.lab, r.auto, r.val, r.alvo, r.pct); });
  let settings='';
  if(metasSettings){
    settings='<div class="panel" style="margin-bottom:18px"><div class="sec-titulo" style="margin-bottom:6px">⚙ Escolher metas exibidas</div>'
      +'<div class="hint" style="margin-bottom:10px">Marque quais indicadores aparecem. Só constam métricas que o sistema mede sozinho (funil e pesquisas).</div>'
      +'<div class="qlist">'+Object.keys(REG).map(k=>{const on=metasAtivas.includes(k);
        return '<div class="qopt '+(on?'on':'')+'" onclick="toggleMeta(\''+k+'\')"><div class="cb">'+(on?'✓':'')+'</div>'+REG[k].lab+(REG[k].auto?' <span class="auto" style="margin-left:6px">AUTO</span>':'')+'</div>';}).join('')
      +'</div></div>';
  }

  const maxN=Math.max(m.nVis,1);
  const frow=(nome,n,conv)=>'<div class="fstage"><div class="fn">'+nome+'</div><div class="fbar"><div style="width:'+Math.max(n/maxN*100,8)+'%">'+n+'</div></div><div class="fconv">'+conv+'</div></div>';
  const funil='<div class="panel funil-box"><div class="sec-titulo" style="margin-bottom:14px">Funil de conversão (clientes do processo)</div>'
    +frow("Visitaram", m.nVis, "100%")
    +frow("Propostas", m.nProp, (m.nVis?Math.round(m.nProp/m.nVis*100):0)+"%")
    +frow("Fecharam", m.nFech, (m.nVis?Math.round(m.nFech/m.nVis*100):0)+"%")
    +'<div class="hint" style="margin-top:12px">Estes números saem direto do Funil — conforme você move clientes pelas etapas, a conversão e o VGV se atualizam aqui.</div></div>';

  return '<div class="view-head" style="display:flex;align-items:flex-end;flex-wrap:wrap;gap:12px">'
    +'<div><h1>Metas</h1><p>Indicadores que o sistema mede sozinho a partir do funil e das pesquisas. Use a engrenagem para escolher quais aparecem.</p></div>'
    +'<div style="margin-left:auto;display:flex;gap:8px;align-items:flex-end">'
    +'<div class="seg">'+['mes','tri','sem','ano'].map(pp=>'<button class="'+(per===pp?'on':'')+'" onclick="setPeriodo(\''+pp+'\')">'+({mes:"Mês",tri:"Trimestre",sem:"Semestre",ano:"Ano"})[pp]+'</button>').join('')+'</div>'
    +'<button class="btn-gear" title="Escolher metas" onclick="toggleMetaSettings()">⚙</button></div></div>'
    +settings
    +'<div class="kpis">'+kpis+'</div>'
    +(metasAtivas.includes('captados')?'<div style="margin-top:6px"><div class="mini" style="margin:14px 0 0"><span style="font-size:12.5px;color:var(--muted)">Simular captação de imóvel:</span><button onclick="capMinus()">−</button><button onclick="capPlus()">+</button></div></div>':'')
    +'<div class="panel" style="margin-top:18px"><div class="sec-titulo" style="margin-bottom:10px">Modelo de atuação</div>'
    +'<div class="hint" style="margin:0">A Andressa é responsável pelas etapas 1 a 6 (apoiada pela Lais no primeiro contato), o corretor pelas 7 a 9, e a negociação e o fechamento (10 a 12) são conjuntos; o pós-venda cuida das 13 a 15.</div></div>'
    +funil;
}

  {q:"O que mais pesa na sua decisão?", opts:[
    {t:"Ter todos os dados e a documentação em ordem", k:"analitico"},
    {t:"Resolver rápido, com o melhor custo-benefício", k:"controlador"},
    {t:"Imaginar minha família vivendo ali", k:"apoiador"},
    {t:"Um imóvel diferente, com personalidade", k:"catalisador"}]},
  {q:"Num imóvel, você repara primeiro em…", opts:[
    {t:"Metragem e detalhes técnicos", k:"analitico"},
    {t:"Preço e praticidade", k:"controlador"},
    {t:"Espaços de convivência (sala, quintal)", k:"apoiador"},
    {t:"Arquitetura e diferenciais do projeto", k:"catalisador"}]},
  {q:"Como prefere ser atendido?", opts:[
    {t:"Com informação e sem pressa", k:"analitico"},
    {t:"De forma direta e objetiva", k:"controlador"},
    {t:"Com calma, entendendo minha rotina", k:"apoiador"},
    {t:"Vendo o que aquele imóvel tem de único", k:"catalisador"}]},
];
function optBtns(campo, valores, sel){
  return '<div class="opts">'+valores.map(v=>'<div class="opt'+(sel===v?' on':'')+'" onclick="setForm(\''+campo+'\',\''+v+'\')">'+v+'</div>').join('')+'</div>';
}
function renderFormulario(){
  const f=formInteresse;
  let perfilQs='';
  PERFIL_QS.forEach((pq,qi)=>{
    const sel=f['p'+(qi+1)];
    perfilQs+='<div class="ffield"><span class="fl">'+pq.q+'</span><div class="opt-col">'
      +pq.opts.map((o)=>'<div class="opt'+(sel===o.k?' on':'')+'" onclick="setForm(\'p'+(qi+1)+'\',\''+o.k+'\')">'+o.t+'</div>').join('')
      +'</div></div>';
  });
  const phone='<div class="phone"><div class="phone-top"><h3>Encontre seu imóvel 🏡</h3><p>Imobiliária Porto Real · leva 1 minuto</p></div>'
    +'<div class="phone-body">'
    +'<div class="ffield"><span class="fl">Você quer…</span>'+optBtns('op',["Comprar","Alugar"],f.op)+'</div>'
    +'<div class="ffield"><span class="fl">Tipo de imóvel</span>'+optBtns('tipoImovel',["Casa","Apartamento","Terreno"],f.tipoImovel)+'</div>'
    +'<div class="ffield"><span class="fl">Quantos quartos?</span>'+optBtns('quartos',["1","2","3","4+"],f.quartos)+'</div>'
    +'<div class="ffield"><span class="fl">Localização desejada</span><input style="width:100%;font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--linha);border-radius:9px" placeholder="Bairro ou cidade" value="'+esc(f.local)+'" oninput="setForm(\'local\',this.value)"></div>'
    +'<div class="ffield"><span class="fl">Faixa de valor</span><div class="opt-col">'+["Até R$ 200 mil","R$ 200–350 mil","R$ 350–500 mil","Acima de R$ 500 mil"].map(v=>'<div class="opt'+(f.valor===v?' on':'')+'" onclick="setForm(\'valor\',\''+v+'\')">'+v+'</div>').join('')+'</div></div>'
    +'<div class="ffield"><span class="fl">Prazo para decidir</span>'+optBtns('prazo',["Já","3 meses","6 meses+"],f.prazo)+'</div>'
    +'<div class="ffield"><span class="fl">Forma de pagamento</span>'+optBtns('pgto',["À vista","Financiado","Ainda não sei"],f.pgto)+'</div>'
    +'<div style="border-top:1px solid var(--linha);margin:6px 0 12px;padding-top:12px"><span class="fl" style="color:var(--azul)">Para te atendermos melhor 💬</span></div>'
    +perfilQs
    +'<div class="lgpd">🔒 Ao enviar, você concorda que a Porto Real use estas informações para te apresentar imóveis adequados, conforme a LGPD. Seus dados não são compartilhados com terceiros.</div>'
    +'<button class="btn" style="width:100%;margin-top:12px" onclick="enviarForm()">Enviar</button>'
    +'</div></div>';
  let dev='';
  if(formEnviado){const p=PERFIS[formEnviado];
    dev='<div class="devnote show"><b>👀 Visão do corretor (o cliente não vê isto):</b><br>Pelas respostas das 3 perguntas finais, o perfil dominante identificado foi <b>'+p.emo+' '+p.nome+'</b> — '+p.busca.toLowerCase()+'. Esse lead entraria no Funil já com o perfil sugerido e o playbook pronto.</div>';
  } else {
    dev='<div class="devnote show" style="border-color:var(--azul);background:var(--azul-bg);color:#2a4a66">As 3 últimas perguntas parecem inocentes para o cliente, mas cada resposta aponta para um dos 4 estilos. Preencha e clique em <b>Enviar</b> para ver o perfil que o sistema deduz.</div>';
  }
  const right='<div class="panel"><div class="sec-titulo" style="margin-bottom:12px">O que este formulário faz</div>'
    +'<div class="hint">À esquerda, a tela que o <b>cliente</b> preenche no celular. As perguntas de cima mapeiam o <b>interesse</b> (o que procura). As 3 de baixo, em linguagem neutra, mapeiam o <b>perfil</b> sem rótulo.</div>'
    +dev+'</div>';
  return '<div class="cols"><div>'+phone+'</div><div>'+right+'</div></div>';
}
function setForm(campo,val){ formInteresse[campo]=val; formEnviado=null; render(); }
function enviarForm(){
  const f=formInteresse; const tal={};
  ['p1','p2','p3'].forEach(k=>{ if(f[k]) tal[f[k]]=(tal[f[k]]||0)+1; });
  let best=null,bn=0; for(const k in tal){ if(tal[k]>bn){bn=tal[k];best=k;} }
  if(!best){ alert("Responda as 3 perguntas finais para o sistema identificar o perfil."); return; }
  formEnviado=best; render();
}

function renderBanco(){
  const filtros=[['todos','Todos'],['comprou','Comprou'],['naocomprou','Não comprou'],['proprietario','Proprietário']];
  const fil='<div class="filtros">'+filtros.map(p=>'<button class="'+(bancoFiltro===p[0]?'on':'')+'" onclick="setBancoFiltro(\''+p[0]+'\')">'+p[1]+'</button>').join('')+'</div>';
  const lista=respostas.filter(r=>bancoFiltro==='todos'||r.tipo===bancoFiltro);
  const nt=respostas.filter(r=>r.notaAtend!=null);
  const mAtend=(nt.reduce((s,r)=>s+r.notaAtend,0)/nt.length).toFixed(1);
  const ns=respostas.filter(r=>r.notaSite!=null);
  const mSite=(ns.reduce((s,r)=>s+r.notaSite,0)/ns.length).toFixed(1);
  const ncor=respostas.filter(r=>r.notaCorretor!=null);
  const mCor=(ncor.reduce((s,r)=>s+r.notaCorretor,0)/ncor.length).toFixed(1);
  const naoComprou=respostas.filter(r=>r.tipo==='naocomprou').length;
  const stats='<div class="stat-row">'
    +'<div class="stat"><div class="l">Atendimento</div><div class="v">'+mAtend+'<span style="font-size:14px;color:var(--muted)">/10</span></div></div>'
    +'<div class="stat"><div class="l">Corretor</div><div class="v">'+mCor+'<span style="font-size:14px;color:var(--muted)">/10</span></div></div>'
    +'<div class="stat"><div class="l">Site</div><div class="v">'+mSite+'<span style="font-size:14px;color:var(--muted)">/10</span></div></div>'
    +'<div class="stat"><div class="l">Não compraram</div><div class="v">'+naoComprou+'</div></div></div>';
  const motivos={};
  respostas.forEach(r=>{ if(r.motivo) motivos[r.motivo]=(motivos[r.motivo]||0)+1; });
  const maxM=Math.max.apply(null,Object.values(motivos).concat([1]));
  let temas='';
  Object.entries(motivos).sort((a,b)=>b[1]-a[1]).forEach(e=>{
    temas+='<div class="tema"><div class="tn">'+e[0]+'</div><div class="tb"><div style="width:'+(e[1]/maxM*100)+'%"></div></div><div class="tv">'+e[1]+'</div></div>';
  });
  const temasBox='<div class="panel" style="margin-bottom:18px"><div class="sec-titulo" style="margin-bottom:12px">Por que não compraram (motivos mais citados)</div><div class="temas">'+temas+'</div></div>';
  let cards='';
  lista.forEach(r=>{
    const tc=tipoCfg[r.tipo]; const p=r.perfil?PERFIS[r.perfil]:null;
    cards+='<div class="lead-card"><div class="lc-top"><span class="lc-nome">'+r.nome+'</span>'
      +'<span class="tipo-tag" style="background:'+tc.bg+';color:'+tc.c+'">'+tc.l+'</span>'
      +(p?'<span class="tipo-tag" style="background:var(--azul-claro);color:var(--azul)">'+p.emo+' '+p.nome+' (perfil)</span>':'')
      +'<span style="margin-left:auto;font-size:11.5px;color:var(--muted)">'+r.data+'</span></div>'
      +'<div class="lc-grid">'
      +'<div><b>Interesse</b>'+r.interesse.op+'</div>'
      +'<div><b>Imóvel</b>'+r.interesse.tipoImovel+' · '+r.interesse.quartos+' q</div>'
      +'<div><b>Local</b>'+r.interesse.local+'</div>'
      +'<div><b>Valor</b>'+r.interesse.valor+'</div>'
      +(r.notaAtend!=null?'<div><b>Atendimento</b>'+r.notaAtend+'/10</div>':'')
      +(r.motivo?'<div style="grid-column:1/-1"><b>Por que não fechou</b>'+r.motivo+'</div>':'')
      +'</div></div>';
  });
  let funnelLeads='<div class="sec-titulo" style="margin-bottom:6px">Leads cadastrados no funil</div>'
    +'<p style="font-size:12.5px;color:var(--muted);margin-bottom:13px">Tudo que você cadastra no funil cai aqui automaticamente. Você pode preencher a ficha você mesmo ou enviar o formulário para o cliente preencher.</p>';
  clientes.forEach(cl=>{ const pp=cl.perfil?PERFIS[cl.perfil]:null;
    funnelLeads+='<div class="lead-card"><div class="lc-top"><span class="lc-nome">'+cl.nome+'</span>'
      +(pp?'<span class="tipo-tag" style="background:var(--azul-claro);color:var(--azul)">'+pp.emo+' '+pp.nome+'</span>':'')
      +'<span class="tipo-tag" style="background:#eef4fa;color:#1F4E79">Etapa '+(cl.etapa+1)+'</span>'
      +(cl.expressa?'<span class="tipo-tag" style="background:#fbf1e3;color:#c77d2e">via expressa</span>':'')
      +'<span style="margin-left:auto;font-size:11.5px;color:var(--muted)">'+(cl.objetivo||'')+'</span></div>'
      +'<div class="lc-grid"><div><b>Telefone</b>'+(cl.contato||'—')+'</div><div><b>E-mail</b>'+(cl.email||'—')+'</div>'
      +'<div><b>Faixa</b>'+(cl.faixa||'—')+'</div><div><b>Local</b>'+(cl.local||'—')+'</div>'
      +(cl.preferencia?'<div style="grid-column:1/-1"><b>Preferência</b>'+esc(cl.preferencia)+'</div>':'')+'</div></div>';
  });
  return funnelLeads
    +'<div class="sec-titulo" style="margin:24px 0 12px">Opiniões e satisfação (pesquisas)</div>'
    +stats+temasBox+fil+cards;
}
function setBancoFiltro(f){ bancoFiltro=f; render(); }

document.getElementById('overlay').addEventListener('click',function(e){if(e.target.id==='overlay')fecharModal();});
render();
</script>
</body>
</html>
