<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxograma de Contratos – Porto Real</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:   #334050;
  --blue2:  #4a5e75;
  --red:    #eb3238;
  --red2:   #c42830;
  --green:  #1a7a4a;
  --green2: #155f3a;
  --amber:  #d97706;
  --light:  #f4f6f8;
  --white:  #ffffff;
  --border: #dde3ea;
  --text:   #1e2a35;
  --muted:  #6b7a8d;
  --shadow: 0 4px 24px rgba(45,62,80,.12);
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--light);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── HEADER ── */
.header {
  background: var(--blue);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  gap: 2rem;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 3px solid var(--red);
}

.header-title {
  font-size: .75rem;
  font-weight: 500;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
}

.header-brand {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: .9rem;
  font-weight: 600;
  color: #fff;
  letter-spacing: .04em;
}

.header-brand span { color: rgba(255,255,255,.45); font-weight: 400; }

.header-sep { flex: 1; }

.restart-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.18);
  color: rgba(255,255,255,.7);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: .75rem;
  padding: .35rem .9rem;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: .05em;
  transition: all .2s;
}
.restart-btn:hover { background: rgba(255,255,255,.14); color: #fff; }

/* ── BREADCRUMB TRAIL ── */
.trail-wrap {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: .7rem 2rem;
  overflow-x: auto;
  white-space: nowrap;
}

.trail {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  min-width: 0;
}

.trail-step {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  font-size: .72rem;
  color: var(--muted);
}

.trail-step .crumb {
  background: var(--light);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: .2rem .6rem;
  font-size: .68rem;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.trail-step .crumb.decision-yes  { border-color: #bbdacc; color: var(--green); background: #f0faf5; }
.trail-step .crumb.decision-no   { border-color: #f5c0c0; color: var(--red);   background: #fff5f5; }
.trail-step .crumb.decision-opt  { border-color: #b8cfe0; color: var(--blue);  background: #f0f5fa; }

.trail-arrow { color: var(--border); font-size: .8rem; }

/* ── MAIN STAGE ── */
.stage {
  max-width: 680px;
  margin: 2.5rem auto;
  padding: 0 1.2rem;
}

/* NODE CARD */
.node-card {
  background: var(--white);
  border-radius: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slideIn .28s cubic-bezier(.25,.8,.25,1);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.node-header {
  padding: 1.2rem 1.6rem;
  display: flex;
  align-items: center;
  gap: .9rem;
}

.node-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.type-action   .node-header { background: var(--blue); }
.type-action   .node-icon   { background: rgba(255,255,255,.12); }
.type-action   .node-type, .type-action .node-title { color: #fff; }

.type-decision .node-header { background: #fff8e8; border-bottom: 1px solid #f5dfa0; }
.type-decision .node-icon   { background: rgba(217,119,6,.12); }
.type-decision .node-type   { color: var(--amber); }
.type-decision .node-title  { color: var(--text); }

.type-terminal-ok .node-header  { background: #f0faf5; border-bottom: 1px solid #b8ddc9; }
.type-terminal-ok .node-icon    { background: rgba(26,122,74,.1); }
.type-terminal-ok .node-type    { color: var(--green); }
.type-terminal-ok .node-title   { color: var(--text); }

.type-terminal-err .node-header { background: #fff5f5; border-bottom: 1px solid #f5c0c0; }
.type-terminal-err .node-icon   { background: rgba(224,32,32,.08); }
.type-terminal-err .node-type   { color: var(--red); }
.type-terminal-err .node-title  { color: var(--text); }

.type-warning  .node-header { background: #fff5f0; border-bottom: 1px solid #f8d0b0; }
.type-warning  .node-icon   { background: rgba(217,119,6,.1); }
.type-warning  .node-type   { color: #c05000; }
.type-warning  .node-title  { color: var(--text); }

.node-type {
  font-size: .63rem;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-bottom: .1rem;
}

.node-title {
  font-size: 1.1rem;
  font-weight: 600;
  line-height: 1.25;
}

/* NODE BODY */
.node-body {
  padding: 1.4rem 1.6rem;
}

.node-desc {
  font-size: .9rem;
  line-height: 1.7;
  color: #3a4a5a;
  margin-bottom: 1.2rem;
}

/* CHECKLIST */
.node-checklist {
  background: var(--light);
  border-radius: 8px;
  padding: .8rem 1rem;
  margin-bottom: 1.2rem;
}

.node-checklist-title {
  font-size: .65rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .6rem;
}

.check-item {
  display: flex;
  align-items: flex-start;
  gap: .6rem;
  padding: .3rem 0;
  font-size: .84rem;
  color: var(--text);
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.check-item:last-child { border-bottom: none; }

.check-box {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem;
  color: transparent;
}
.check-box.checked { background: var(--green); border-color: var(--green); color: #fff; }

/* SCRIPT BOX */
.script-box {
  background: #f0f5fa;
  border-left: 3px solid var(--blue);
  border-radius: 0 8px 8px 0;
  padding: .9rem 1.1rem;
  margin-bottom: 1.2rem;
  font-size: .84rem;
  line-height: 1.65;
  color: #2a3a4a;
  font-style: italic;
}

.script-label {
  font-size: .62rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--blue);
  font-style: normal;
  display: block;
  margin-bottom: .35rem;
}

/* ALERT BOX */
.alert-box {
  border-radius: 8px;
  padding: .8rem 1rem;
  margin-bottom: 1.2rem;
  font-size: .84rem;
  line-height: 1.6;
  display: flex;
  gap: .7rem;
  align-items: flex-start;
}
.alert-box .alert-icon { font-size: 1rem; flex-shrink: 0; }
.alert-red    { background: #fff0f0; border: 1px solid #fbbcbc; color: #7a1010; }
.alert-green  { background: #f0faf5; border: 1px solid #a8d8be; color: #0e4a28; }
.alert-blue   { background: #f0f5fa; border: 1px solid #b0cce0; color: #1a3050; }
.alert-amber  { background: #fffbf0; border: 1px solid #f5d88a; color: #7a4a00; }

/* BUTTONS */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: .6rem;
  margin-top: .4rem;
}

.btn-row {
  display: flex;
  gap: .6rem;
}

.btn {
  flex: 1;
  border: none;
  border-radius: 8px;
  padding: .85rem 1.2rem;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: .88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  text-align: center;
  line-height: 1.3;
}

.btn-yes  { background: var(--green); color: #fff; }
.btn-yes:hover { background: var(--green2); transform: translateY(-1px); }

.btn-no   { background: var(--red); color: #fff; }
.btn-no:hover { background: var(--red2); transform: translateY(-1px); }

.btn-next { background: var(--blue); color: #fff; }
.btn-next:hover { background: var(--blue2); transform: translateY(-1px); }

.btn-opt  { background: var(--light); color: var(--text); border: 1.5px solid var(--border); }
.btn-opt:hover { background: #e8edf2; border-color: #b0bec8; transform: translateY(-1px); }

.btn-warn { background: var(--amber); color: #fff; }
.btn-warn:hover { opacity: .9; transform: translateY(-1px); }

.btn-icon { font-size: 1rem; }

/* STEP COUNTER */
.step-counter {
  text-align: center;
  font-size: .72rem;
  color: var(--muted);
  margin-bottom: 1rem;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .05em;
}

/* PROGRESS BAR */
.progress-wrap {
  height: 3px;
  background: var(--border);
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
}
.progress-fill {
  height: 100%;
  background: var(--red);
  transition: width .4s ease;
}

@media (max-width: 500px) {
  .stage { margin: 1.2rem auto; }
  .btn-row { flex-direction: column; }
  .node-header { padding: 1rem 1.2rem; }
  .node-body   { padding: 1rem 1.2rem; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <span class="header-brand">Porto Real <span>· Contratos</span></span>
  <span class="header-sep"></span>
  <span class="header-title">Fluxo de Locação — Entrada</span>
  <span class="header-sep"></span>
  <button class="restart-btn" onclick="restart()">↺ Reiniciar</button>
</header>

<!-- TRAIL -->
<div class="trail-wrap" id="trailWrap">
  <div class="trail" id="trail"></div>
</div>

<!-- STAGE -->
<div class="stage">
  <div class="step-counter" id="stepCounter">etapa 1</div>
  <div id="nodeContainer"></div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<script>
const NODES = {

  // ── INÍCIO ──────────────────────────────────────────────────────────────────
  start: {
    type: 'action',
    icon: '🏠', typeLabel: 'Início',
    title: 'Nova locação — demanda recebida',
    desc: 'O corretor registrou um pedido de fechamento no IMOB. O setor de Contratos assume o processo a partir deste momento.',
    checklist: [
      'Verificar registro no IMOB pelo corretor',
      'Identificar o imóvel pretendido',
      'Verificar o valor do aluguel negociado',
      'Verificar a data pretendida de entrada',
      'Verificar o tipo de garantia discutida (fiador ou caução)',
    ],
    alert: { style: 'alert-blue', icon: 'ℹ️', text: 'O processo só começa com o registro formal do corretor no IMOB. Sem esse registro, não há processo de contratos.' },
    buttons: [{ label: 'Demanda recebida — iniciar contato', icon: '→', style: 'btn-next', next: 'contato_cliente', crumb: 'Demanda recebida', crumbStyle: 'decision-opt' }]
  },

  // ── CONTATO INICIAL ──────────────────────────────────────────────────────────
  contato_cliente: {
    type: 'action',
    icon: '💬', typeLabel: 'Contato inicial',
    title: 'Contato com cliente e proprietário',
    desc: 'Entrar em contato com o cliente via Digsac apresentando o setor administrativo. Simultaneamente, contatar o proprietário também pelo Digsac para alinhar os pontos essenciais.',
    checklist: [
      'Enviar mensagem de apresentação ao cliente via Digsac',
      'Contatar proprietário via Digsac',
      'Alinhar com proprietário: data de entrada pretendida',
      'Alinhar com proprietário: confirmar valor final do aluguel',
      'Alinhar com proprietário: tipo de garantia aceita (fiador, caução ou ambos)',
    ],
    script: '"Olá [nome]! Sou do setor administrativo da Porto Real. Recebi as informações sobre seu interesse no imóvel e vou conduzir o processo de locação com você. Em breve envio a lista de documentos necessários."',
    alert: { style: 'alert-blue', icon: 'ℹ️', text: 'Todo contato com clientes e proprietários é feito exclusivamente pelo Digsac. Comunicação interna (equipe) é feita pelo WhatsApp.' },
    buttons: [{ label: 'Contatos realizados — solicitar documentos', icon: '→', style: 'btn-next', next: 'solicitar_docs', crumb: 'Contato inicial feito', crumbStyle: 'decision-opt' }]
  },

  // ── SOLICITAR DOCUMENTOS ─────────────────────────────────────────────────────
  solicitar_docs: {
    type: 'action',
    icon: '📄', typeLabel: 'Documentação',
    title: 'Enviar rol de documentos ao cliente',
    desc: 'Enviar o rol de documentos pelo Digsac. Comunicar claramente as regras de envio para evitar retrabalho.',
    checklist: [
      'Enviar rol de documentos via Digsac',
      'Informar: tudo por e-mail, em único e-mail, digitalizado',
      'Informar: não aceitar foto de documento',
      'Informar: incluir e-mail e telefone de todos os envolvidos',
      'Se fiador: informar que os mesmos documentos são necessários',
      'Se caução: informar valor (3x aluguel) e formas de depósito',
    ],
    alert: { style: 'alert-amber', icon: '⚠️', text: 'Documentos fora do padrão (foto, incompleto, e-mails separados) atrasam a análise. Orientar o cliente com clareza desde o início.' },
    buttons: [{ label: 'Documentos recebidos — iniciar análise', icon: '→', style: 'btn-next', next: 'q_docs_completos', crumb: 'Docs solicitados', crumbStyle: 'decision-opt' }]
  },

  // ── DECISÃO: DOCS COMPLETOS? ─────────────────────────────────────────────────
  q_docs_completos: {
    type: 'decision',
    icon: '📋', typeLabel: 'Verificação',
    title: 'Os documentos recebidos estão completos?',
    desc: 'Verificar se todos os documentos necessários foram recebidos por e-mail, digitalizados e em conformidade com o rol solicitado.',
    buttons: [
      { label: 'Sim — documentos completos', icon: '✓', style: 'btn-yes', next: 'pesquisa_cpf', crumb: 'Docs completos', crumbStyle: 'decision-yes' },
      { label: 'Não — faltam documentos', icon: '✗', style: 'btn-no', next: 'docs_faltando', crumb: 'Docs incompletos', crumbStyle: 'decision-no' },
    ]
  },

  // ── DOCS FALTANDO ────────────────────────────────────────────────────────────
  docs_faltando: {
    type: 'warning',
    icon: '📎', typeLabel: 'Documentação pendente',
    title: 'Solicitar documentação pendente',
    desc: 'Entrar em contato com o cliente via Digsac informando exatamente quais documentos estão faltando.',
    checklist: [
      'Identificar os documentos pendentes',
      'Contatar o cliente via Digsac com lista específica do que falta',
      'Aguardar envio dos documentos pendentes',
    ],
    script: '"Olá [nome]! Recebi sua documentação, mas ainda estão faltando: [lista de documentos]. Por favor, envie ao e-mail [email] assim que possível para darmos continuidade ao processo."',
    buttons: [{ label: 'Documentos pendentes recebidos', icon: '→', style: 'btn-next', next: 'pesquisa_cpf', crumb: 'Pendência resolvida', crumbStyle: 'decision-yes' }]
  },

  // ── PESQUISA CPF ─────────────────────────────────────────────────────────────
  pesquisa_cpf: {
    type: 'action',
    icon: '🔎', typeLabel: 'Análise cadastral',
    title: 'Pesquisa de CPF no Serasa Experian',
    desc: 'Realizar pesquisa de todos os envolvidos no contrato no Serasa Experian antes de verificar a renda.',
    checklist: [
      'Pesquisar CPF do inquilino no Serasa Experian',
      'Pesquisar CPF do cônjuge (se compõe renda)',
      'Pesquisar CPF do fiador (se garantia for fiador)',
      'Registrar resultado de cada pesquisa',
    ],
    buttons: [
      { label: 'CPF sem restrições — verificar renda', icon: '✓', style: 'btn-yes', next: 'verificar_renda', crumb: 'CPF limpo', crumbStyle: 'decision-yes' },
      { label: 'CPF com restrição encontrada', icon: '✗', style: 'btn-no', next: 'cpf_restricao', crumb: 'Restrição no CPF', crumbStyle: 'decision-no' },
    ]
  },

  // ── CPF COM RESTRIÇÃO ────────────────────────────────────────────────────────
  cpf_restricao: {
    type: 'warning',
    icon: '⚠️', typeLabel: 'Restrição cadastral',
    title: 'CPF com restrição — tratar com cliente',
    desc: 'Informar o cliente sobre a restrição encontrada via Digsac. Verificar possibilidade de regularização. Manter proprietário informado.',
    checklist: [
      'Informar o cliente sobre a restrição via Digsac',
      'Verificar junto ao cliente se há possibilidade de regularização',
      'Comunicar o proprietário sobre o status via Digsac',
      'Aguardar posição do cliente',
    ],
    script: '"Olá [nome]! Durante nossa análise cadastral, identificamos uma restrição no CPF [do inquilino / do fiador]. Para prosseguirmos com a locação, precisamos verificar a possibilidade de regularização. Pode nos informar sobre essa situação?"',
    alert: { style: 'alert-amber', icon: '⚠️', text: 'Não tomar decisão sozinho nesse ponto. Informar e aguardar. Proprietário deve estar ciente.' },
    buttons: [
      { label: 'Cliente regularizou / situação resolvida', icon: '✓', style: 'btn-yes', next: 'verificar_renda', crumb: 'CPF regularizado', crumbStyle: 'decision-yes' },
      { label: 'Não foi possível regularizar', icon: '✗', style: 'btn-no', next: 'locacao_perdida', crumb: 'CPF não regularizado', crumbStyle: 'decision-no' },
    ]
  },

  // ── VERIFICAR RENDA ──────────────────────────────────────────────────────────
  verificar_renda: {
    type: 'action',
    icon: '💰', typeLabel: 'Análise de renda',
    title: 'Verificar compatibilidade de renda',
    desc: 'A renda comprovada deve ser igual ou superior a 3 vezes o valor do aluguel. Se cônjuge compõe renda, analisar o conjunto.',
    checklist: [
      'Calcular: renda necessária = valor do aluguel × 3',
      'Verificar renda comprovada do inquilino',
      'Se cônjuge compõe: somar renda do cônjuge e analisar conjunto',
      'Comparar renda total com o mínimo exigido',
    ],
    alert: { style: 'alert-blue', icon: 'ℹ️', text: 'Regra: renda mínima = 3x o aluguel. Ex: aluguel R$ 1.500 → renda mínima R$ 4.500.' },
    buttons: [
      { label: 'Renda compatível (≥ 3x aluguel)', icon: '✓', style: 'btn-yes', next: 'q_tipo_garantia', crumb: 'Renda aprovada', crumbStyle: 'decision-yes' },
      { label: 'Renda incompatível (< 3x aluguel)', icon: '✗', style: 'btn-no', next: 'renda_insuficiente', crumb: 'Renda insuficiente', crumbStyle: 'decision-no' },
    ]
  },

  // ── RENDA INSUFICIENTE ───────────────────────────────────────────────────────
  renda_insuficiente: {
    type: 'warning',
    icon: '📊', typeLabel: 'Renda insuficiente',
    title: 'Renda insuficiente — tentar composição',
    desc: 'A renda individual não atinge o mínimo. Verificar possibilidade de composição de renda com cônjuge.',
    checklist: [
      'Informar o cliente sobre a necessidade de composição de renda',
      'Solicitar documentos do cônjuge (se ainda não enviados)',
      'Analisar renda conjunta (inquilino + cônjuge)',
      'Verificar se conjunto atinge o mínimo de 3x o aluguel',
    ],
    buttons: [
      { label: 'Renda conjunta suficiente', icon: '✓', style: 'btn-yes', next: 'q_tipo_garantia', crumb: 'Renda composta OK', crumbStyle: 'decision-yes' },
      { label: 'Mesmo com cônjuge, renda insuficiente', icon: '✗', style: 'btn-no', next: 'locacao_perdida', crumb: 'Renda insuficiente', crumbStyle: 'decision-no' },
    ]
  },

  // ── TIPO DE GARANTIA ─────────────────────────────────────────────────────────
  q_tipo_garantia: {
    type: 'decision',
    icon: '🛡️', typeLabel: 'Garantia',
    title: 'Qual é o tipo de garantia do contrato?',
    desc: 'O tipo de garantia define os próximos passos para formalização.',
    buttons: [
      { label: 'Fiador', style: 'btn-opt', next: 'q_fiador_aprovado', crumb: 'Garantia: fiador', crumbStyle: 'decision-opt' },
      { label: 'Caução (depósito)', style: 'btn-opt', next: 'caucao_deposito', crumb: 'Garantia: caução', crumbStyle: 'decision-opt' },
    ]
  },

  // ── FIADOR: APROVADO? ────────────────────────────────────────────────────────
  q_fiador_aprovado: {
    type: 'decision',
    icon: '👤', typeLabel: 'Fiador',
    title: 'O fiador foi aprovado na análise?',
    desc: 'A pesquisa do CPF e a análise de renda do fiador foram concluídas. Qual é o resultado?',
    buttons: [
      { label: 'Fiador aprovado', icon: '✓', style: 'btn-yes', next: 'cadastro_sistema', crumb: 'Fiador aprovado', crumbStyle: 'decision-yes' },
      { label: 'Fiador reprovado', icon: '✗', style: 'btn-no', next: 'fiador_reprovado', crumb: 'Fiador reprovado', crumbStyle: 'decision-no' },
    ]
  },

  // ── FIADOR REPROVADO ─────────────────────────────────────────────────────────
  fiador_reprovado: {
    type: 'warning',

const TOTAL = 20;

let history = [];
let checks  = {};
let current = 'start';

function render(nodeId) {
  current = nodeId;
  const node = NODES[nodeId];

  const pct = Math.min(98, Math.round((history.length / TOTAL) * 100));
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCounter').textContent = `etapa ${history.length + 1}`;

  const trail = document.getElementById('trail');
  trail.innerHTML = '';
  history.forEach((h, i) => {
    if (i > 0) trail.innerHTML += `<span class="trail-arrow">›</span>`;
    trail.innerHTML += `<span class="trail-step"><span class="crumb ${h.crumbStyle}">${h.crumbLabel}</span></span>`;
  });

  let html = `<div class="node-card type-${node.type}">`;

  html += `<div class="node-header">
    <div class="node-icon">${node.icon}</div>
    <div>
      <div class="node-type">${node.typeLabel}</div>
      <div class="node-title">${node.title}</div>
    </div>
  </div>`;

  html += `<div class="node-body">`;
  html += `<p class="node-desc">${node.desc}</p>`;

  if (node.alert) {
    html += `<div class="alert-box ${node.alert.style}"><span class="alert-icon">${node.alert.icon}</span><span>${node.alert.text}</span></div>`;
  }

  if (node.script) {
    html += `<div class="script-box"><span class="script-label">💬 Frase padrão</span>${node.script}</div>`;
  }

  if (node.checklist) {
    if (!checks[nodeId]) checks[nodeId] = new Set();
    html += `<div class="node-checklist"><div class="node-checklist-title">✓ O que fazer</div>`;
    node.checklist.forEach((item, i) => {
      const checked = checks[nodeId].has(i);
      html += `<div class="check-item">
        <div class="check-box ${checked ? 'checked' : ''}" onclick="toggleCheck('${nodeId}',${i})">${checked ? '✓' : ''}</div>
        <span style="${checked ? 'text-decoration:line-through;color:#aaa' : ''}">${item}</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="btn-group">`;
  const btns = node.buttons;

  if (btns.length === 2 && (btns[0].style === 'btn-yes' || btns[0].style === 'btn-no')) {
    html += `<div class="btn-row">`;
    btns.forEach(b => {
      html += `<button class="btn ${b.style}" onclick="go('${b.next}','${escapeCrumb(b.crumb)}','${b.crumbStyle}')">
        ${b.icon ? `<span class="btn-icon">${b.icon}</span>` : ''} ${b.label}
      </button>`;
    });
    html += `</div>`;
  } else {
    btns.forEach(b => {
      html += `<button class="btn ${b.style}" onclick="go('${b.next}','${escapeCrumb(b.crumb)}','${b.crumbStyle}')">
        ${b.icon ? `<span class="btn-icon">${b.icon}</span>` : ''} ${b.label}
      </button>`;
    });
  }

  html += `</div></div></div>`;
  document.getElementById('nodeContainer').innerHTML = html;

  const tw = document.getElementById('trailWrap');
  tw.scrollLeft = tw.scrollWidth;
}

function escapeCrumb(s) { return (s || '').replace(/'/g, "\\'"); }

function go(nextId, crumbLabel, crumbStyle) {
  if (nextId === 'start') { restart(); return; }
  if (crumbLabel) history.push({ crumbLabel, crumbStyle });
  render(nextId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCheck(nodeId, idx) {
  if (!checks[nodeId]) checks[nodeId] = new Set();
  if (checks[nodeId].has(idx)) checks[nodeId].delete(idx);
  else checks[nodeId].add(idx);
  render(current);
}

function restart() {
  history = [];
  checks  = {};
  current = 'start';
  render('start');
  window.scrollTo({ top: 0 });
}

render('start');
</script>
